default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: autocoder
      description: Autonomous long-task execution loop with structured planning. Based on E01 Research's Gameboy methodology.
      source: https://github.com/restrolla/skills/blob/main/autocoder/SKILL.md

    - name: composite-panel-figures
      description: Create reviewer-ready composite scientific figure panels from real source figures and metadata. Assemble, crop, redraw, revise, or QA grant/manuscript figure panels with provenance metadata and concise legends.
      source: https://github.com/restrolla/skills/blob/main/composite-panel-figures/SKILL.md

    - name: deep-research
      description: Multi-phase iterative research on any topic using parallel search, source evaluation, and structured synthesis. Produces citation-backed reports. Quick, deep, and comparison modes.
      source: https://github.com/restrolla/skills/blob/main/deep-research/SKILL.md

    - name: doe-genesis-mission
      description: DOE Genesis Mission (DE-FOA-0003612) grant writing. Handles narratives, Excel templates, Zotero references, compliance validation, and iterative 9-reviewer panel review.
      source: https://github.com/restrolla/skills/blob/main/doe-genesis-mission/SKILL.md

    - name: figure-analyzer
      description: Two-step scientific figure analysis — XML description + panel-by-panel analysis with findings, statistics, and confidence scores.
      source: https://github.com/restrolla/skills/blob/main/figure-analyzer/SKILL.md

    - name: figure-decomposer
      description: Decompose publication figures into editable PowerPoint-compatible SVGs using Florence-2 OCR, LLM vision segmentation, and semantic labeling.
      source: https://github.com/restrolla/skills/blob/main/figure-decomposer/SKILL.md

    - name: latex-document
      description: Universal LaTeX document skill — 27 templates, 27 scripts, 26 reference guides. Create, compile, OCR, and convert any document to professional PDF. Resumes, theses, posters, exams, cheat sheets, charts, mail merge, diffing, and more.
      source: https://github.com/restrolla/skills/blob/main/latex-document-skill/SKILL.md

    - name: graphpad-prism
      description: Read, write, and manipulate GraphPad Prism data files (.pzfx, .prism) using Python and pandas. Supports XY/column tables, replicates, and analysis extraction.
      source: https://github.com/restrolla/skills/blob/main/graphpad-prism/SKILL.md

    - name: humanizer
      description: Remove signs of AI-generated writing by detecting and fixing 38 patterns based on Wikipedia and AI detector research.
      source: https://github.com/restrolla/skills/blob/main/humanizer/SKILL.md

    - name: nih-grant-writer
      description: Comprehensive NIH grant writing for R01, R21, DP1, R35 etc. — Specific Aims, Research Strategy, review criteria, and resubmissions.
      source: https://github.com/restrolla/skills/blob/main/nih-grant-writer/SKILL.md

    - name: nih-reporter
      description: Search NIH RePORTER database for federally-funded research projects and publications with CSV/JSON/Excel export and funding landscape analysis.
      source: https://github.com/restrolla/skills/blob/main/nih-reporter/SKILL.md

    - name: nih-sbir-sttr-grant-writer
      description: NIH SBIR/STTR grant applications — Phase I/II/Fast Track support with milestone plans, commercialization guides, and reviewer response strategies.
      source: https://github.com/restrolla/skills/blob/main/nih-sbir-sttr-grant-writer/SKILL.md

    - name: notebooklm
      description: Programmatic API for Google NotebookLM — create notebooks, add sources, generate artifacts, and download results in multiple formats.
      source: https://github.com/restrolla/skills/blob/main/notebooklm/SKILL.md

    - name: s10-grant-writer
      description: NIH S10 Shared Instrumentation Grant Implementation Plans (sections A-G) with automated PI research pipeline.
      source: https://github.com/restrolla/skills/blob/main/s10-grant-writer/SKILL.md

    - name: tpp-analysis
      description: R analysis pipelines for Thermal Proteome Profiling experiments — preprocessing, spline fitting, differential stats, pathway enrichment, and publication figures.
      source: https://github.com/restrolla/skills/blob/main/tpp-analysis/SKILL.md

    - name: fragpipe-tmt-analysis
      description: FragPipe v24.0 headless TMT isobaric proteomics pipeline supporting TMT6-35, Astral/Orbitrap/timsTOF instruments, UniProt proteome downloads, and full project scaffolding.
      source: https://github.com/restrolla/skills/blob/main/fragpipe-tmt-analysis/SKILL.md

    - name: tikz-figure
      description: Create publication-quality TikZ figures and PGFPlots data visualizations. Covers schematics, flowcharts, state machines, network graphs, circuit diagrams, data plots, and annotated illustrations with 7-stage workflow and visual self-review.
      source: https://github.com/restrolla/skills/blob/main/tikz-figure/SKILL.md

    - name: web-search-agent
      description: Parallel web search, scrape, and summarise pipeline using Jina/Brave APIs. Query decomposition, extractive summarisation, Playwright fallback.
      source: https://github.com/restrolla/skills/blob/main/web-search-agent/SKILL.md

    - name: fireworks-tech-graph
      description: Generate production-quality SVG technical diagrams from natural language. 7 visual styles, 14+ diagram types (including UML), 40+ product icons, PNG export via rsvg-convert.
      source: https://github.com/yizhiyanhua-ai/fireworks-tech-graph/blob/main/SKILL.md

    - name: research-cite
      description: Find real, verified citations for any text and import them into Zotero collections. Searches Crossref, PubMed, and Semantic Scholar, verifies every reference through a 3-level pipeline (DOI resolution, metadata cross-check, abstract semantic support), then imports verified items into Zotero via the Web API.
      source: https://github.com/restrolla/skills/blob/main/research-cite/SKILL.md

    - name: quarto-to-docx
      description: Convert Quarto .qmd files to DOCX/Word with bulletproof citation handling. Validates citation keys against .bib files, auto-fixes common issues (broken bibliography paths, missing entries, YAML misconfig), renders to DOCX via quarto, then post-validates the output to catch unresolved citations or missing bibliography sections. Never refuses to render — always produces a valid DOCX.
      source: https://github.com/restrolla/skills/blob/main/quarto-to-docx/SKILL.md

    - name: map-questions
      description: Generate NWEA MAP Growth practice test questions for Math and Reading. Produces PDF question booklets and separate answer keys with solutions, distractor analysis, and RIT band labels. Math questions include TikZ diagrams.
      source: https://github.com/restrolla/skills/blob/main/map-questions/SKILL.md

    - name: diann-analysis
      description: DIA-NN 2.3.2 headless DIA proteomics pipeline. Supports spectral library generation, library-free analysis, and LFQ quantification with .NET runtime configuration for stability.
      source: https://github.com/restrolla/skills/blob/main/diann-analysis/SKILL.md

    - name: pdf-to-markdown
      description: Extract PDF content to clean markdown with inline figure descriptions, markdown tables, and proper paragraph formatting. Uses mimo-v2.5 for vision tasks. DAG workflow with parallel processing and QC checks.
      source: https://github.com/restrolla/skills/blob/main/pdf-to-markdown/SKILL.md

    - name: boltz2-local-gpu
      description: Run Boltz-2 structure prediction on local GPUs with multi-GPU parallel dispatch, checkpointing, and result parsing. Includes the critical TensorBoard bug fix that must be applied on every run.
      source: https://github.com/restrolla/skills/blob/main/boltz2-local-gpu/SKILL.md

    - name: boltz-parcc
      description: Run Boltz-2 protein structure prediction on UPenn's PARCC Betty HPC cluster (DGX B200 GPUs, Slurm). Covers Kerberos auth including AFK-safe klist + /usr/bin/kinit -R renewal preflight, conda environment setup, Slurm job submission, monitoring, and teardown.
      source: https://github.com/restrolla/skills/blob/main/boltz-parcc/SKILL.md

    - name: boltz-remote-server
      description: Deploy and run Boltz-2 structure prediction on remote GPU servers (RunPod, ThunderCompute, vast.ai, Lambda Labs, or any SSH-accessible Linux box with NVIDIA GPUs).
      source: https://github.com/restrolla/skills/blob/main/boltz-remote-server/SKILL.md

    - name: esmfold2-parcc
      description: Run ESMFold2 protein structure prediction on UPenn's PARCC Betty HPC cluster (DGX B200 GPUs, Slurm). Covers conda environment setup, MSA handling, AFK-safe Kerberos renewal preflight, Slurm job submission, and result retrieval.
      source: https://github.com/restrolla/skills/blob/main/esmfold2-parcc/SKILL.md

    - name: mmseqs2-msa-gpu
      description: Generate multiple sequence alignments (MSAs) using MMseqs2 with GPU server mode. Batch a3m generation for structure prediction pipelines.
      source: https://github.com/restrolla/skills/blob/main/mmseqs2-msa-gpu/SKILL.md

    - name: research-planning
      description: Plan a research project by decomposing it into a task DAG with dependencies, model assignments, resource estimates, and MANDATORY checks. Every plan must include code tests, scientific controls, and preflight checks including remote-HPC Kerberos/SSH auth renewal before AFK /run.
      source: https://github.com/restrolla/skills/blob/main/research-planning/SKILL.md

    - name: cns-paper-maker
      description: Design, critique, and upgrade biological/biomedical study architectures toward Cell, Nature, and Science standards. Covers 12-step mandatory workflow (live search, CNS pivot, causality, orthogonal validation, human anchoring, figure architecture, scoring), 10 field-specific technique stacks, 40 technique cards, anti-pattern detection, and CNS readiness scoring rubric. Includes supplementary methods from current research covering neuroscience genetics, organoids/PDX/iPSCs, GPU-accelerated workflows, novel pharmacology, and AI/virtual cell models.
      source: https://github.com/restrolla/skills/blob/main/cns-paper-maker/SKILL.md

  agents: []
  prompts: []
