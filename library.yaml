default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: autocoder
      description: Autonomous long-task execution loop with structured planning. Based on E01 Research's Gameboy methodology.
      source: https://github.com/restrolla/skills/blob/main/autocoder/SKILL.md

    - name: doe-genesis-mission
      description: DOE Genesis Mission (DE-FOA-0003612) grant writing. Handles narratives, Excel templates, Zotero references, compliance validation, and iterative 9-reviewer panel review.
      source: https://github.com/restrolla/skills/blob/main/doe-genesis-mission/SKILL.md

    - name: graphpad-prism
      description: Read, write, and manipulate GraphPad Prism data files (.pzfx, .prism) using Python and pandas. Supports XY/column tables, replicates, and analysis extraction.
      source: https://github.com/restrolla/skills/blob/main/graphpad-prism/SKILL.md

    - name: web-search-agent
      description: Parallel web search, scrape, and summarise pipeline using Jina/Brave APIs. Query decomposition, extractive summarisation, Playwright fallback.
      source: https://github.com/restrolla/skills/blob/main/web-search-agent/SKILL.md

  agents: []
  prompts: []
